services:
  # Backend FastAPI Web Service
  - type: web
    name: pyzer-backend
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: GOOGLE_API_KEY
        sync: false  # Enter your Google Gemini API Key in the Render dashboard
      - key: GROQ_API_KEY
        sync: false  # Enter your Groq API Key in the Render dashboard
      - key: HUGGINGFACE_API_KEY
        sync: false  # Enter your Hugging Face API Key in the Render dashboard

  # Frontend React Static Site
  - type: web
    name: pyzer-frontend
    runtime: static
    buildCommand: cd frontend && npm install && npm run build
    staticPublishPath: frontend/build
    headers:
      - path: /*
        headers:
          - key: Cache-Control
            value: public, max-age=31536000
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: REACT_APP_API_URL
        fromService:
          name: pyzer-backend
          type: web
          property: url
